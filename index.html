<!-- UNIT KARTLAR -->

<div class="unit-scroll">
  <div class="unit-card" onclick="goster('tercio')">Tercio</div>
  <div class="unit-card" onclick="goster('unit2')">Unit 2</div>
  <div class="unit-card" onclick="goster('unit3')">Unit 3</div>
</div>

<!-- DETAY ALANI -->

<div id="detay" style="margin-top:20px;"></div>

<script>
function goster(unit) {

  let veri = {
    tercio: {
      baslik: "Tercio Arquebusiers",
      resim: "images/tercio.jpg",
      icerik: "Yüksek hasar. Düşük mobilite. Doğru konumla oyunu taşır."
    },
    unit2: {
      baslik: "Unit 2",
      resim: "images/unit2.jpg",
      icerik: "Örnek açıklama."
    },
    unit3: {
      baslik: "Unit 3",
      resim: "images/unit3.jpg",
      icerik: "Örnek açıklama."
    }
  };

  let secilen = veri[unit];

  document.getElementById("detay").innerHTML = `
    <div style="background:#161616; padding:20px; border-radius:8px;">
      <h2>${secilen.baslik}</h2>
      <img src="${secilen.resim}" style="width:300px; margin-bottom:10px;">
      <p>${secilen.icerik}</p>
    </div>
  `;
}
</script>
