<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Respawn Hub - Unit Kataloğu</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #fff;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

input, select {
  padding: 8px;
  background: #1a1a1a;
  color: white;
  border: none;
}

.unit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 10px;
}

.unit {
  position: relative;
  background: #1a1a1a;
  cursor: pointer;
  border-radius: 6px;
  overflow: hidden;
}

.unit.selected {
  outline: 2px solid #5865F2;
}

.unit img {
  width: 100%;
  height: 100px;
  object-fit: cover;
}

.fav {
  position: absolute;
  top: 5px;
  right: 5px;
  cursor: pointer;
}

.detail {
  margin-top: 30px;
  background: #161616;
  border-radius: 10px;
  padding: 20px;
  display: flex;
  gap: 20px;
}

.detail img {
  width: 200px;
}

.tag {
  background: #333;
  padding: 5px 10px;
  margin-right: 5px;
}
</style>

</head>

<body>

<div class="container">

<h1>Unit Kataloğu</h1>

<div class="controls">
<input type="text" id="search" placeholder="Ara...">
<select id="tierFilter">
<option value="">Tüm Tier</option>
<option value="T3">T3</option>
<option value="T4">T4</option>
<option value="T5">T5</option>
</select>
</div>

<div class="unit-grid" id="grid">

<div class="unit" data-id="tercio" data-name="Tercio Arquebusiers" data-tier="T5" data-desc="Yüksek hasar." data-img="tercio.jpg">
<img src="tercio.jpg" loading="lazy">
<div class="fav">☆</div>
</div>

<div class="unit" data-id="pref" data-name="Prefecture Guards" data-tier="T3" data-desc="Hızlı ve ucuz." data-img="pref.jpg">
<img src="pref.jpg" loading="lazy">
<div class="fav">☆</div>
</div>

<div class="unit" data-id="namkhan" data-name="Namkhan Archers" data-tier="T4" data-desc="Bleed hasarı." data-img="namkhan.jpg">
<img src="namkhan.jpg" loading="lazy">
<div class="fav">☆</div>
</div>

</div>

<div class="detail" id="detail">
<img id="dImg" src="tercio.jpg">
<div>
<h2 id="dName">Seç</h2>
<div>
<span class="tag" id="dTier"></span>
</div>
<p id="dDesc"></p>
</div>
</div>

</div>

<script>
const units = document.querySelectorAll(".unit");
const search = document.getElementById("search");
const tier = document.getElementById("tierFilter");

let favs = JSON.parse(localStorage.getItem("favs")) || [];

function updateFavUI() {
  units.forEach(u=>{
    const star = u.querySelector(".fav");
    star.innerText = favs.includes(u.dataset.id) ? "★" : "☆";
  });
}

updateFavUI();

units.forEach(u=>{
  u.onclick = ()=>{
    document.querySelectorAll(".unit").forEach(x=>x.classList.remove("selected"));
    u.classList.add("selected");

    document.getElementById("dName").innerText = u.dataset.name;
    document.getElementById("dTier").innerText = u.dataset.tier;
    document.getElementById("dDesc").innerText = u.dataset.desc;
    document.getElementById("dImg").src = u.dataset.img;

    history.replaceState(null, "", "?unit=" + u.dataset.id);
  };

  u.querySelector(".fav").onclick = (e)=>{
    e.stopPropagation();
    const id = u.dataset.id;

    if(favs.includes(id)){
      favs = favs.filter(x=>x!==id);
    } else {
      favs.push(id);
    }

    localStorage.setItem("favs", JSON.stringify(favs));
    updateFavUI();
  };
});

search.oninput = filter;
tier.onchange = filter;

function filter(){
  const s = search.value.toLowerCase();

  units.forEach(u=>{
    const matchText = u.dataset.name.toLowerCase().includes(s);
    const matchTier = !tier.value || u.dataset.tier === tier.value;

    u.style.display = (matchText && matchTier) ? "block" : "none";
  });
}

const params = new URLSearchParams(window.location.search);
const unitId = params.get("unit");

if(unitId){
  const el = document.querySelector(`[data-id="${unitId}"]`);
  if(el) el.click();
}
</script>

</body>
</html>
