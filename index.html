<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Kataloğu</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #fff;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* GRID */
.unit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 10px;
}

/* KART */
.unit {
  background: #1a1a1a;
  cursor: pointer;
  border-radius: 6px;
  overflow: hidden;
  transition: 0.2s;
}

.unit:hover {
  transform: scale(1.05);
}

.unit img {
  width: 100%;
  height: 100px;
  object-fit: cover;
}

/* DETAY KART */
.detail {
  margin-top: 30px;
  background: #161616;
  border-radius: 10px;
  padding: 20px;
  display: flex;
  gap: 20px;
}

.detail img {
  width: 200px;
  border-radius: 8px;
}

.detail-info h2 {
  margin-top: 0;
}

.tag {
  display: inline-block;
  background: #333;
  padding: 5px 10px;
  margin-right: 5px;
  border-radius: 4px;
  font-size: 12px;
}
</style>

</head>

<body>

<div class="container">

<h1>Unit Kataloğu</h1>

<div class="unit-grid">

<!-- UNIT -->

<div class="unit" onclick="showUnit(this)"
data-name="Tercio Arquebusiers"
data-tier="T5"
data-type="Ranged"
data-desc="Yüksek hasar. Yavaş ama güçlü."
data-img="tercio.jpg">
<img src="tercio.jpg">
</div>

<div class="unit" onclick="showUnit(this)"
data-name="Prefecture Guards"
data-tier="T3"
data-type="Melee"
data-desc="Hızlı. Ucuz. Erken oyunda güçlü."
data-img="prefecture.jpg">
<img src="prefecture.jpg">
</div>

<div class="unit" onclick="showUnit(this)"
data-name="Namkhan Archers"
data-tier="T4"
data-type="Ranged"
data-desc="Bleed hasarı ile öne çıkar."
data-img="namkhan.jpg">
<img src="namkhan.jpg">
</div>

</div>

<!-- DETAY -->

<div class="detail" id="detailBox">
<img src="tercio.jpg" id="detailImg">

<div class="detail-info">
<h2 id="detailName">Tercio Arquebusiers</h2>

<div>
<span class="tag" id="detailTier">T5</span>
<span class="tag" id="detailType">Ranged</span>
</div>

<p id="detailDesc">Yüksek hasar. Yavaş ama güçlü.</p>
</div>

</div>

</div>

<script>
function showUnit(el) {
  document.getElementById("detailName").innerText = el.dataset.name;
  document.getElementById("detailTier").innerText = el.dataset.tier;
  document.getElementById("detailType").innerText = el.dataset.type;
  document.getElementById("detailDesc").innerText = el.dataset.desc;
  document.getElementById("detailImg").src = el.dataset.img;
}
</script>

</body>
</html>
