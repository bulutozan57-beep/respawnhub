<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Respawn Hub - Unit Kataloğu</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* CONTROLS */
.controls {
  display:flex;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

input, select {
  padding:8px;
  background:#1a1a1a;
  color:white;
  border:none;
}

/* GRID */
.unit-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
  gap:10px;
  margin-bottom:30px;
}

.unit {
  position:relative;
  background:#1a1a1a;
  border-radius:6px;
  overflow:hidden;
  cursor:pointer;
}

.unit.selected {
  outline:2px solid #fff;
}

.unit img {
  width:100%;
  height:90px;
  object-fit:cover;
}

/* TIER */
.tier {
  position:absolute;
  bottom:5px;
  left:5px;
  font-size:11px;
  padding:2px 6px;
  border-radius:4px;
}

.t1{background:#777;}
.t2{background:#2ecc71;}
.t3{background:#3498db;}
.t4{background:#9b59b6;}
.t5{background:#f1c40f;color:#000;}

.fav {
  position:absolute;
  top:5px;
  right:5px;
}

/* DETAIL */
.detail {
  width:100%;
  background:#161616;
  border-radius:10px;
  padding:20px;
  display:flex;
  gap:40px;
}

.left { flex:2; }
.right { flex:1; max-width:300px; }

.section { margin-bottom:15px; }
.section h4 { margin:0 0 5px 0; color:#aaa; }

/* IMAGE */
.right img {
  width:100%;
  max-width:250px;
  margin-bottom:15px;
}

/* STATS */
.bar {
  height:8px;
  background:#333;
  margin-bottom:10px;
}

.fill {
  height:100%;
  background:#2ecc71;
}

/* MOBILE */
@media(max-width:768px){
  .detail { flex-direction:column; }
  .right { max-width:100%; }
}
</style>

</head>

<body>

<div class="container">

<h1>Unit Kataloğu</h1>

<div class="controls">
<input id="search" placeholder="Ara...">
<select id="tierFilter">
<option value="">Tier</option>
<option>T1</option>
<option>T2</option>
<option>T3</option>
<option>T4</option>
<option>T5</option>
</select>
</div>

<!-- GRID -->

<div class="unit-grid">

<div class="unit t5" data-id="vareng"
data-name="Vareng Muhafızı"
data-tier="T5"
data-best="Ön safta tank"
data-basic="HP doktrin"
data-master="Hasar azaltma"
data-hero="Uzun savaş"
data-dmg="90" data-hp="95" data-spd="40"
data-img="varangian_guards_main.png">
<img src="varangian_guards_main.png">
<div class="tier t5">T5</div>
<div class="fav">☆</div>
</div>

<div class="unit t4" data-id="berserker"
data-name="Berserker"
data-tier="T4"
data-best="Flank"
data-basic="Hasar"
data-master="Crit"
data-hero="Kill"
data-dmg="95" data-hp="60" data-spd="80"
data-img="berserker_main.png">
<img src="berserker_main.png">
<div class="tier t4">T4</div>
<div class="fav">☆</div>
</div>

<div class="unit t3" data-id="yeniceri"
data-name="Yeniçeri"
data-tier="T3"
data-best="Dengeli"
data-basic="Defans"
data-master="Denge"
data-hero="Uzun kullanım"
data-dmg="70" data-hp="70" data-spd="60"
data-img="janissary_main.png">
<img src="janissary_main.png">
<div class="tier t3">T3</div>
<div class="fav">☆</div>
</div>

<div class="unit t2" data-id="kargili"
data-name="Kargılı Milis"
data-tier="T2"
data-best="Savunma"
data-basic="HP"
data-master="Block"
data-hero="XP"
data-dmg="50" data-hp="80" data-spd="40"
data-img="pk_mil_pre.png">
<img src="pk_mil_pre.png">
<div class="tier t2">T2</div>
<div class="fav">☆</div>
</div>

<div class="unit t1" data-id="martelletore"
data-name="Martelletore"
data-tier="T1"
data-best="Erken oyun"
data-basic="Ucuz"
data-master="Gerek yok"
data-hero="Yeni oyuncu"
data-dmg="30" data-hp="40" data-spd="50"
data-img="martella.png">
<img src="martella.png">
<div class="tier t1">T1</div>
<div class="fav">☆</div>
</div>

</div>

<!-- DETAIL -->

<div class="detail">

<div class="left">
<h2 id="dName">Birlik seç</h2>
<p id="dTier"></p>

<div class="section">
<h4>En iyi kullanım</h4>
<p id="dBest"></p>
</div>

<div class="section">
<h4>Basit Doktrin</h4>
<p id="dBasic"></p>
</div>

<div class="section">
<h4>Usta Doktrin</h4>
<p id="dMaster"></p>
</div>

<div class="section">
<h4>Gazilik</h4>
<p id="dHero"></p>
</div>

</div>

<div class="right">
<img id="dImg">

Hasar

<div class="bar"><div id="dmg" class="fill"></div></div>

Dayanıklılık

<div class="bar"><div id="hp" class="fill"></div></div>

Hız

<div class="bar"><div id="spd" class="fill"></div></div>

</div>

</div>

</div>

<script>
const units=document.querySelectorAll(".unit");

units.forEach(u=>{
u.onclick=()=>{
units.forEach(x=>x.classList.remove("selected"));
u.classList.add("selected");

dName.innerText=u.dataset.name;
dTier.innerText=u.dataset.tier;
dBest.innerText=u.dataset.best;
dBasic.innerText=u.dataset.basic;
dMaster.innerText=u.dataset.master;
dHero.innerText=u.dataset.hero;

dImg.src=u.dataset.img;
dmg.style.width=u.dataset.dmg+"%";
hp.style.width=u.dataset.hp+"%";
spd.style.width=u.dataset.spd+"%";
};
});

search.oninput=()=>{
const s=search.value.toLowerCase();
units.forEach(u=>{
u.style.display=u.dataset.name.toLowerCase().includes(s)?"block":"none";
});
};

tierFilter.onchange=()=>{
units.forEach(u=>{
u.style.display=!tierFilter.value||u.dataset.tier===tierFilter.value?"block":"none";
});
};
</script>

</body>
</html>
